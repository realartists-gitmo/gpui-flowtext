[package]
name = "gpui-flowtext"
version = "0.1.0"
edition = "2024"

[dependencies]
crop = "0.4.3"
gpui = "0.2.2"
hotpath = "0.16.1"
rustc-hash = "2.1.2"
serde = { version = "1.0.228", features = ["derive"] }
tempfile = "3"
uuid = { version = "1.23.1", features = ["serde", "v4"] }

[target.'cfg(any(target_os = "macos", target_os = "linux"))'.dependencies]
hotpath-cpu-support = { package = "hotpath", version = "0.16.1", features = ["hotpath-cpu"], optional = true }

[features]
hotpath = ["hotpath/hotpath"]
hotpath-cpu = ["hotpath", "dep:hotpath-cpu-support"]
hotpath-alloc = ["hotpath", "hotpath/hotpath-alloc"]
